<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#16233a"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd089"/>
      <stop offset="35%" stop-color="#f5a23b"/>
      <stop offset="100%" stop-color="#f5a23b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded dark tile -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- lens ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#3f9bd6" stroke-width="3"/>
  <!-- inner warm arc accent (echoes the orange sweep in the logo) -->
  <path d="M 14 40 A 22 22 0 0 0 50 40" fill="none" stroke="#f5a23b" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

  <!-- node network (simple, legible) -->
  <g stroke="#3f9bd6" stroke-width="1.4" opacity="0.8">
    <line x1="32" y1="32" x2="20" y2="22"/>
    <line x1="32" y1="32" x2="44" y2="22"/>
    <line x1="32" y1="32" x2="22" y2="44"/>
    <line x1="32" y1="32" x2="43" y2="43"/>
  </g>
  <g fill="#7cc0ec">
    <circle cx="20" cy="22" r="2.4"/>
    <circle cx="44" cy="22" r="2.4"/>
    <circle cx="22" cy="44" r="2.4"/>
    <circle cx="43" cy="43" r="2.4"/>
  </g>

  <!-- glowing core -->
  <circle cx="32" cy="32" r="13" fill="url(#core)"/>
  <circle cx="32" cy="32" r="4.5" fill="#fff2d6"/>
  <circle cx="32" cy="32" r="4.5" fill="none" stroke="#f5a23b" stroke-width="1.5"/>
</svg>
